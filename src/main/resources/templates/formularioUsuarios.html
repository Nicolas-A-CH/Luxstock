<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <aside th:replace="~{fragments/layout :: menu}"></aside>
    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h2 th:text="${usuarioDTO.idEmpleado != null ? 'Editar Usuario' : 'Crear Usuario'}">Crear Usuario</h2>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <div class="card card-outline card-primary">
                            <div class="card-header">
                                <h4 class="mb-3 border-bottom pb-2">Información de Empleado</h4>
                            </div>
                            <form id="formUsuarioEmpleado" th:action="@{/api/guardarusuario}" th:object="${usuarioDTO}" method="post" novalidate>
                                <div class="card-body">
                                    <input type="hidden" id="idEmpleado" th:field="*{idEmpleado}">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="nombre">Nombre</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                                </div>
                                                <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Ej: Juan">
                                                <div class="invalid-feedback">El nombre es obligatorio.</div>
                                            </div>

                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="apellido">Apellido</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                                </div>
                                                <input type="text" id="apellido" th:field="*{apellido}"
                                                       class="form-control" placeholder="Ej: Hernandez">
                                                <div class="invalid-feedback">El apellido es obligatorio.</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="documento">Documento</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                                </div>
                                                <input type="text" id="documento" th:field="*{documento}"
                                                       class="form-control" placeholder="Ej. 1234567890"
                                                       th:attr="data-original=*{documento}">
                                                <div class="invalid-feedback"></div>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="telefono">Teléfono</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                                </div>
                                                <input type="text" id="telefono" th:field="*{telefono}"
                                                       class="form-control" placeholder="Ej. 3000000000">
                                                <div class="invalid-feedback"></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="idRol" >Rol</label>
                                            <select id="idRol" th:field="*{idRol}" class="form-select" required>
                                                <option value="">Seleccione un Rol</option>
                                                <option th:each="rol : ${roles}" th:value="${rol.idRol}" th:text="${rol.nombre}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="idSede" >Sede</label>
                                            <select id="idSede" th:field="*{idSede}" class="form-select" required>
                                                <option value="">Seleccione una Sede</option>
                                                <option th:each="sede : ${sedes}" th:value="${sede.idSede}" th:text="${sede.nombre}"></option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row mt-4">
                                        <div class="col-md-6 mb-3">
                                            <label for="username">Nombre de Usuario</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                                </div>
                                                <input type="text" id="username" th:field="*{username}"
                                                       class="form-control" placeholder="Ej. pruebas">
                                                <div class="invalid-feedback">El nombre de usuario es obligatorio.</div>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="password" >Contraseña</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                                </div>
                                                <input type="password" id="password" th:field="*{password}" class="form-control"
                                                       th:placeholder="${usuarioDTO.idEmpleado != null ? 'Dejar en blanco para no cambiar' : ''}">
                                                <div class="input-group-append">
                                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                </div>
                                                <div class="invalid-feedback"></div>
                                            </div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="validatepassword">Repetir contraseña</label>
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                                </div>
                                                <input type="password" id="validatepassword" class="form-control">
                                                <div class="input-group-append">
                                                    <button class="btn btn-outline-secondary" type="button" id="toggleValidatePassword">
                                                        <i class="fas fa-eye"></i>
                                                    </button>
                                                </div>
                                                <div class="invalid-feedback"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <button type="submit" class="btn btn-success">Guardar Usuario y Empleado</button>
                                    <a th:href="@{/luxbar/usuarios}" class="btn btn-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script src="/js/formularioUsuarios.js"></script>
</body>
</html>
