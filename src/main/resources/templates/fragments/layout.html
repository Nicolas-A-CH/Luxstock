<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxBar</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" th:href="@{/webjars/AdminLTE/3.2.0/dist/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/sweetalert2/11.26.17/dist/sweetalert2.min.css}">
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap4.min.css">
</head>
<body class="hold-transition sidebar-mini">
    <!-- Navbar Fragment -->
    <nav th:fragment="navbar" class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>
    </nav>

    <!-- Sidebar Fragment -->
    <aside th:fragment="menu" class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/" class="brand-link">
            <span class="brand-text font-weight-light">LuxBar</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">

                    <!-- Dashboard: Visible para todos los autenticados -->
                    <li class="nav-item">
                        <a th:href="@{/luxbar/dashboard}" class="nav-link">
                            <i class="nav-icon fas fa-tachometer-alt"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>

                    <!-- Usuarios y Sedes: Solo Administrador -->
                    <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                        <a th:href="@{/luxbar/usuarios}" class="nav-link">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Usuarios</p>
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                        <a th:href="@{/luxbar/sedes}" class="nav-link">
                            <i class="nav-icon fas fa-building"></i>
                            <p>Sedes</p>
                        </a>
                    </li>

                    <!-- Ventas: Administrador y Cajero -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMINISTRADOR', 'CAJERO')">
                        <a th:href="@{/luxbar/ventas}" class="nav-link">
                            <i class="nav-icon fas fa-shopping-cart"></i>
                            <p>Ventas</p>
                        </a>
                    </li>

                    <!-- Pedidos: Administrador y Mesero -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMINISTRADOR', 'MESERO')">
                        <a th:href="@{/luxbar/pedidos}" class="nav-link">
                            <i class="nav-icon fas fa-clipboard-list"></i>
                            <p>Pedidos</p>
                        </a>
                    </li>

                    <!-- Inventario: Todos los roles -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMINISTRADOR', 'CAJERO', 'MESERO')">
                        <a th:href="@{/inventario}" class="nav-link">
                            <i class="nav-icon fas fa-boxes"></i>
                            <p>Inventario</p>
                        </a>
                    </li>

                    <li class="nav-item mt-3 border-top">
                        <form id="logoutForm" th:action="@{/logout}" method="post" style="display: none;"></form>
                        <a href="javascript:void(0);" class="nav-link" onclick="document.getElementById('logoutForm').submit();">
                            <i class="nav-icon fas fa-sign-out-alt text-danger"></i>
                            <p>Cerrar Sesión</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div th:fragment="scripts">
        <script th:src="@{/webjars/jquery/3.6.4/jquery.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/webjars/sweetalert2/11.26.17/dist/sweetalert2.all.min.js}"></script>
        <script th:src="@{/webjars/AdminLTE/3.2.0/dist/js/adminlte.min.js}"></script>

        <!-- DataTables & Plugins -->
        <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap4.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
        <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
    </div>
</body>
</html>
