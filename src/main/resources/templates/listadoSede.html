<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="hold-transition sidebar-mini">
<aside th:replace="~{fragments/layout :: menu}"></aside>
  <div class="wrapper">
    <div class="content-wrapper">
      <section class="content-header">
        <div class="container-fluid">
          <div class="row mb-2">
            <div class="col-sm-6">
              <h1>Gestión de Sedes</h1>
            </div>
            <div class="col-sm-6">
              <ol class="breadcrumb float-sm-right">
                <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                <li class="breadcrumb-item active">Sedes</li>
              </ol>
            </div>
          </div>
        </div>
      </section>
      <section class="content">
        <div class="container-fluid">
          <div class="card card-outline card-primary">
            <div class="card-header">
              <h3 class="card-title">Listado de Sedes Registrados</h3>
              <div class="card-tools">
                <a th:href="@{/usuarios/nuevo}" class="btn btn-success btn-sm">
                  <i class="fas fa-plus"></i> Nueva Sede
                </a>
              </div>
            </div>

            <div class="card-body table-responsive p-0">
              <table class="table table-hover text-nowrap">
                <thead class="thead-light">
                <tr>
                  <th>ID</th>
                  <th>Nombre</th>
                  <th>Email</th>
                  <th>Rol</th>
                  <th>Estado</th>
                  <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}">
                  <td th:text="${usuario.id}">1</td>
                  <td th:text="${usuario.nombre}">Juan Pérez</td>
                  <td th:text="${usuario.email}">juan@example.com</td>
                  <td>
                    <span class="badge badge-info" th:text="${usuario.rol}">Admin</span>
                  </td>
                  <td>
                                          <span class="badge"
                                                th:classappend="${usuario.activo} ? 'badge-success' : 'badge-danger'"
                                                th:text="${usuario.activo} ? 'Activo' : 'Inactivo'">
                                          </span>
                  </td>
                  <td class="text-center">
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-warning btn-sm">
                      <i class="fas fa-edit"></i>
                    </a>
                    <button class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar usuario?')">
                      <i class="fas fa-trash"></i>
                    </button>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
