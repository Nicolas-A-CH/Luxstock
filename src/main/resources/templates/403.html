<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-container { text-align: center; }
        .error-code { font-size: 10rem; font-weight: bold; color: #dc3545; }
        .error-message { font-size: 1.5rem; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">403</div>
        <div class="error-message">Lo sentimos, no tienes permisos para acceder a esta página.</div>
        <a href="/luxbar/dashboard" class="btn btn-primary">Volver al Dashboard</a>
    </div>
</body>
</html>
