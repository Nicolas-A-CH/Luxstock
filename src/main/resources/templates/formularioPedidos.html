<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <aside th:replace="~{fragments/layout :: menu}"></aside>
    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h2 th:text="${pedidoDTO.idPedido != null ? 'Editar Pedido' : 'Crear Pedido'}"></h2>
                    </div>
                </div>
            </div>
        </section>
        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <div class="card card-outline card-primary">
                            <div class="card-header">
                                <h4 class="mb-3 border-bottom pb-2">Información del pedido</h4>
                            </div>
                            <form th:action="@{/api/registrarPedido}" th:object="${pedidoDTO}" method="post" id="pedidoForm" novalidate>
                                <div class="card-body">
                                    <input type="hidden" th:field="*{idPedido}" />

                                    <!-- FILA DE ESTADO, MESA Y SEDE -->
                                    <div class="row">
                                        <!-- Campo Estado -->
                                        <div class="col-md-4">
                                            <label class="form-label font-weight-bold">Estado</label>
                                            <input th:if="${!isEdit}" type="text" class="form-control" th:field="*{estado}" readonly>
                                            <select th:if="${isEdit}" class="form-select" th:field="*{estado}">
                                                <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                                            </select>
                                        </div>

                                        <!-- Campo Mesa -->
                                        <div class="col-md-4">
                                            <label for="mesa" class="form-label font-weight-bold">Mesa</label>
                                            <input type="number" id="mesa" class="form-control" th:field="*{mesa}" min="1" placeholder="N° de mesa" required>
                                            <div class="invalid-feedback">Por favor, ingrese el número de mesa.</div>
                                        </div>

                                        <!-- Campo Sede -->
                                        <div class="col-md-4">
                                            <label class="form-label font-weight-bold">Sede</label>
                                            <!-- No administrador: sede bloqueada del token -->
                                            <th:block th:if="${!esAdmin}">
                                                <input type="hidden" th:field="*{idSede}" />
                                                <input type="text" class="form-control" th:value="${sedeNombreParaMostrar}" disabled />
                                            </th:block>
                                            <!-- Administrador: selector de todas las sedes -->
                                            <select th:if="${esAdmin}" class="form-select" th:field="*{idSede}" id="idSede" required>
                                                <option value="">Seleccione una sede...</option>
                                                <option th:each="s : ${sedes}"
                                                        th:value="${s.idSede}"
                                                        th:text="${s.nombre}"></option>
                                            </select>
                                            <div th:if="${esAdmin}" class="invalid-feedback">Por favor, seleccione una sede.</div>
                                        </div>
                                    </div>

                                    <hr>
                                    <h5>Productos</h5>
                                    <table class="table table-bordered" id="tablaProductos">
                                        <thead class="table-dark">
                                        <tr>
                                            <th>Producto</th>
                                            <th style="width: 120px;">Stock Disp</th>
                                            <th>Cantidad</th>
                                            <th>Precio Unitario</th>
                                            <th>Subtotal</th>
                                            <th>Acciones</th>
                                        </tr>
                                        </thead>
                                        <tbody id="tbodyDetalles">
                                        <tr th:each="detalle, stat : *{detalles}">
                                            <td>
                                                <input type="hidden" th:field="*{detalles[__${stat.index}__].idDetalle}" />
                                                <select class="form-select producto-select" th:field="*{detalles[__${stat.index}__].idProducto}" onchange="actualizarPrecio(this)">
                                                    <option value="">Seleccione...</option>
                                                    <option th:each="p : ${productos}"
                                                            th:value="${p.idProducto}"
                                                            th:text="${p.nombre}"
                                                            th:data-precio="${p.precio}"></option>
                                                </select>
                                            </td>
                                            <td>
                                                <input type="text" class="form-control stock-input" readonly value="0" style="background-color: #eee; text-align: center; font-weight: bold;">
                                            </td>
                                            <td>
                                                <input type="number" class="form-control cantidad-input" th:field="*{detalles[__${stat.index}__].cantidad}" oninput="calcularSubtotal(this)" min="1">
                                            </td>
                                            <td>
                                                <input type="text" class="form-control precio-unitario" readonly>
                                            </td>
                                            <td>
                                                <input type="text" class="form-control subtotal" readonly>
                                            </td>
                                            <td>
                                                <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">Eliminar</button>
                                            </td>
                                        </tr>
                                        </tbody>
                                        <tfoot>
                                        <tr>
                                            <td colspan="4" class="text-end fw-bold">TOTAL PEDIDO:</td>
                                            <td colspan="1">
                                                <input type="text" id="totalPedido" class="form-control fw-bold" readonly>
                                            </td>
                                            <td>
                                                <button type="button" class="btn btn-success btn-sm" onclick="agregarFila()">+ Agregar Producto</button>
                                            </td>
                                        </tr>
                                        </tfoot>
                                    </table>
                                </div>

                                <div class="card-footer">
                                    <button type="submit" class="btn btn-primary">Guardar Pedido</button>
                                    <a href="/luxbar/pedidos" class="btn btn-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<!-- Template para nueva fila -->
<template id="filaTemplate">
    <tr>
        <td>
            <select name="detalles[INDEX].idProducto" class="form-select producto-select" onchange="actualizarPrecio(this)" required>
                <option value="">Seleccione...</option>
                <option th:each="p : ${productos}" th:value="${p.idProducto}" th:text="${p.nombre}" th:data-precio="${p.precio}"></option>
            </select>
        </td>
        <td>
            <input type="text" class="form-control stock-input" readonly value="0" style="background-color: #eee; text-align: center; font-weight: bold;">
        </td>
        <td>
            <input type="number" name="detalles[INDEX].cantidad" class="form-control cantidad-input" oninput="calcularSubtotal(this)" min="1" required>
        </td>
        <td>
            <input type="text" class="form-control precio-unitario" readonly>
        </td>
        <td>
            <input type="text" class="form-control subtotal" readonly>
        </td>
        <td>
            <button type="button" class="btn btn-danger btn-sm" onclick="eliminarFila(this)">Eliminar</button>
        </td>
    </tr>
</template>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script th:inline="javascript">
    let index = /*[[${pedidoDTO.detalles != null ? pedidoDTO.detalles.size() : 0}]]*/ 0;
</script>
<script src="/js/formularioPedidos.js"></script>
</body>
</html>
