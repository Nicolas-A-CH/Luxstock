<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="hold-transition sidebar-mini">
    <div class="wrapper">
        <nav th:replace="~{fragments/layout :: navbar}"></nav>
        <aside th:replace="~{fragments/layout :: menu}"></aside>
        <div class="content-wrapper">
            <section class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6">
                            <h1>Gestión de Pedidos</h1>
                        </div>
                        <div class="col-sm-6">
                            <ol class="breadcrumb float-sm-right">
                                <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                                <li class="breadcrumb-item active">Pedidos</li>
                            </ol>
                        </div>
                    </div>
                </div>
            </section>
            <section class="content">
                <div class="container-fluid">
                    <div class="card card-outline card-primary">
                        <div class="card-header">
                            <h3 class="card-title">Listado de Pedidos Registrados</h3>
                            <div class="card-tools">
                                <a th:href="@{/luxbar/crear pedidos}" class="btn btn-success btn-sm">
                                    <i class="fas fa-plus"></i> Nuevo Pedido
                                </a>
                            </div>
                        </div>

                        <div class="card-body table-responsive p-0">
                            <table class="table table-hover text-nowrap">
                                <thead class="thead-light">
                                <tr>
                                    <th>#Pedido</th>
                                    <th>Fecha</th>
                                    <th>Estado</th>
                                    <th>Empleado</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="pedido : ${pedidos}">
                                    <td th:text="${pedido.idPedido}"></td>
                                    <td th:text="${pedido.fecha}"></td>
                                    <td th:text="${pedido.estado}"></td>
                                    <td th:text="${pedido.idEmpleado}"></td>
                                    <td class="text-center">
                                        <a th:href="@{/luxbar/editar pedido/{id}(id=${pedido.idPedido})}" class="btn btn-warning btn-sm">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
