<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxStock | Login</title>

    <!-- Fuentes y estilos -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700&display=fallback">
    <link rel="stylesheet" th:href="@{/webjars/AdminLTE/3.2.0/dist/css/adminlte.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}">

    <style>
        /* Fondo con partículas + overlay */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Source Sans Pro', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Caja del login */
        .login-box {
            width: 400px;
            animation: fadeIn 1s ease;
        }

        /* Logo */
        .login-logo img {
            width: 120px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        .login-logo a {
            color: #fff !important;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 3px 8px rgba(0,0,0,0.5);
        }

        /* Tarjeta glass */
        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .login-card-body {
            color: #fff;
        }

        /* Inputs */
        .form-control {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            border-radius: 25px;
            padding-left: 20px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.25);
            color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        .input-group-text {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            border-radius: 0 25px 25px 0;
        }

        /* Botón principal */
        .btn-primary {
            background: linear-gradient(135deg, #007bff, #0056d2);
            border-radius: 25px;
            padding: 10px;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #1a8cff, #004bb5);
        }

        /* Botón volver */
        .btn-outline-secondary {
            border-radius: 25px;
            border-color: #ddd;
            color: #ddd;
        }

        .btn-outline-secondary:hover {
            background: #ddd;
            color: #000;
        }

        /* Animación */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mostrar/ocultar contraseña */
        .toggle-password {
            cursor: pointer;
            color: #fff;
        }

        /* Mensajes */
        .alert {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- Partículas -->
<canvas id="particles"></canvas>

<div class="login-box">

    <div class="login-logo text-center">
        <img th:src="@{/images/logo.webp}" alt="Logo">
        <a th:href="@{/}"><b>Lux</b>Stock</a>
    </div>

    <div class="card">
        <div class="card-body login-card-body">

            <p class="login-box-msg text-white">Ingresa tus credenciales</p>

            <!-- Error -->
            <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                Usuario o contraseña incorrectos.
            </div>

            <!-- Logout -->
            <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
                Has cerrado sesión correctamente.
            </div>

            <form th:action="@{/login}" method="post">

                <div class="input-group mb-3">
                    <input type="text" class="form-control" name="username" placeholder="Usuario" required autofocus>
                    <div class="input-group-append">
                        <div class="input-group-text"><span class="fas fa-user"></span></div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input id="password" type="password" class="form-control" name="password" placeholder="Contraseña" required>
                    <div class="input-group-append">
                        <div class="input-group-text toggle-password">
                            <span class="fas fa-eye"></span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>

            <div class="social-auth-links text-center mt-4">
                <a th:href="@{/}" class="btn btn-block btn-outline-secondary">
                    <i class="fas fa-arrow-left mr-2"></i> Volver al inicio
                </a>
            </div>

        </div>
    </div>
</div>

<!-- Scripts -->
<script th:src="@{/webjars/jquery/3.6.0/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.6.2/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/AdminLTE/3.2.0/dist/js/adminlte.min.js}"></script>

<script>
    // Mostrar / ocultar contraseña
    document.querySelector(".toggle-password").addEventListener("click", function () {
        const input = document.getElementById("password");
        const icon = this.querySelector("span");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    });

    // Partículas
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];

    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 3 + 1,
            dx: (Math.random() - 0.5) * 0.8,
            dy: (Math.random() - 0.5) * 0.8
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fill();

            p.x += p.dx;
            p.y += p.dy;

            if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
