<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>

<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <!-- Navbar -->
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <!-- Sidebar -->
    <aside th:replace="~{fragments/layout :: menu}"></aside>

    <!-- CONTENIDO -->
    <div class="content-wrapper">

        <!-- HEADER -->
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>Gestión de Inventario</h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                            <li class="breadcrumb-item active">Inventario</li>
                        </ol>
                    </div>
                </div>
            </div>
        </section>

        <!-- TABLA -->
        <section class="content">
            <div class="container-fluid">

                <div class="card card-outline card-primary">

                    <div class="card-header d-flex align-items-center justify-content-between">
                        <h3 class="card-title">Listado de Inventario</h3>

                        <!-- Botón de búsqueda añadido (superior izquierda junto a Nuevo Registro) -->
                        <div class="card-tools d-flex align-items-center">
                            <form th:action="@{/inventario}" method="get" class="d-flex mr-2">
                                <input type="text" name="search" th:value="${search}" class="form-control form-control-sm mr-2" placeholder="Buscar producto..." style="width: 200px;">
                                <button type="submit" class="btn btn-default btn-sm">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </form>

                            <a th:href="@{/inventario/nuevo}" class="btn btn-success btn-sm">
                                <i class="fas fa-plus"></i> Nuevo Registro
                            </a>
                        </div>
                    </div>

                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover text-nowrap">

                            <thead class="thead-light">
                            <tr>
                                <th>ID</th>
                                <th>Producto</th>
                                <th>Sede</th>
                                <th>Cantidad</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="i : ${inventarios}">
                                <td th:text="${i.idInventario}"></td>
                                <td th:text="${i.producto.nombre}"></td>
                                <td th:text="${i.sede.nombre}"></td>

                                <!-- 🔵 CAMPO EDITABLE PARA CANTIDAD -->
                                <td>
                                    <input type="number"
                                           min="0"
                                           class="form-control"
                                           th:id="'cantidad-' + ${i.idInventario}"
                                           th:value="${i.cantidad}">
                                </td>

                                <td class="text-center">

                                    <!-- 🔵 BOTÓN PARA GUARDAR CAMBIO -->
                                    <button class="btn btn-primary btn-sm"
                                            th:onclick="'actualizarCantidad(' + ${i.idInventario} + ')'">
                                        <i class="fas fa-save"></i>
                                    </button>

                                    <a th:href="@{/inventario/eliminar/{id}(id=${i.idInventario})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('¿Eliminar registro?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>

                        </table>
                    </div>

                </div>

            </div>
        </section>

    </div>

</div>

<!-- Scripts -->
<div th:replace="~{fragments/layout :: scripts}"></div>

<!-- 🔵 SCRIPT PARA ACTUALIZAR CANTIDAD -->
<script>
    function actualizarCantidad(idInventario) {
        const cantidad = document.getElementById("cantidad-" + idInventario).value;

        fetch("/api/actualizarCantidadInventario", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `idInventario=${idInventario}&cantidad=${cantidad}`
        })
            .then(r => r.ok
                ? Swal.fire("Éxito", "Cantidad actualizada correctamente", "success")
                : Swal.fire("Error", "No se pudo actualizar la cantidad", "error")
            );
    }
</script>

</body>
</html>
