spring.application.name=LuxStock

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/luxbar?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de límites para Multipart (Evita error 413 Content Too Large)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
